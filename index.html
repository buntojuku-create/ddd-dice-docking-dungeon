<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DDD</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="fake-top">
      <div class="status-row">
        <span>12:24</span>
        <span>🔕</span>
        <span class="status-right">▮▮▮ Wi‑Fi 80</span>
      </div>

      <div class="browser-row">
        <button class="circle-btn" type="button">✕</button>
        <div class="url-pill">ntojuku-create.github.io</div>
        <button class="circle-btn" type="button">☰</button>
      </div>
    </section>

    <section class="hud">
      <div class="hud-card">
        <span class="hud-label">ステージ</span>
        <strong id="stageName">---</strong>
      </div>
      <div class="hud-card">
        <span class="hud-label">移動</span>
        <strong id="moveCount">0</strong>
      </div>
      <div class="hud-card">
        <span class="hud-label">選択中</span>
        <strong id="selectedInfo">なし</strong>
      </div>
      <div class="hud-card">
        <span class="hud-label">残り</span>
        <strong id="remainCount">0</strong>
      </div>
    </section>

    <section class="message" id="message">
      ダイスを選んで転がそう。同じ上面の目が、その目の数以上つながると消える。
    </section>

    <section class="board-shell">
      <div class="board-shadow"></div>
      <section id="board" class="board" aria-label="ゲーム盤面"></section>
    </section>

    <section class="controls">
      <button class="move-button up" data-dir="up" type="button">↑</button>
      <button class="move-button left" data-dir="left" type="button">←</button>
      <button class="move-button right" data-dir="right" type="button">→</button>
      <button class="move-button down" data-dir="down" type="button">↓</button>
    </section>

    <section class="bottom-panel">
      <div class="rule-card">
        <h2>ルール</h2>
        <p>ダイスは1個ずつ単独で転がします。</p>
        <p>同じ上面の目が縦横につながり、その目の数以上になると全部消えます。</p>
        <p>例：上面3のダイスが3個以上つながると、その3のダイスが消えます。</p>
        <p>1は消えません。盤面のダイスをすべて消すとクリアです。</p>
      </div>

      <div class="mini-actions">
        <button id="resetButton" class="mini-btn" type="button">↺ リセット</button>
      </div>
    </section>
  </main>

  <div id="clearModal" class="modal hidden">
    <div class="modal-content">
      <h2>STAGE CLEAR!</h2>
      <p id="clearText">クリア！</p>
      <button id="modalResetButton" type="button">もう一度遊ぶ</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
