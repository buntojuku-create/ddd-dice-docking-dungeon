<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>DDD</title><link rel="stylesheet" href="style.css"></head><body><main class="app"><header class="game-header"><div><h1>DDD</h1><p>Dice Docking Dungeon</p></div><button id="resetButton" class="reset-btn" type="button">リセット</button></header><section class="hud"><div><span>ステージ</span><strong id="stageName">---</strong></div><div><span>移動</span><strong id="moveCount">0</strong></div><div><span>選択中</span><strong id="selectedInfo">なし</strong></div><div><span>残り</span><strong id="remainCount">0</strong></div></section><section id="message" class="message">ダイスを選んで転がそう。同じ上面の目が、その目の数以上つながると消える。</section><section class="scene-wrap" id="sceneWrap"></section><section class="controls"><button class="move-button up" data-dir="up">↑</button><button class="move-button left" data-dir="left">←</button><button class="move-button right" data-dir="right">→</button><button class="move-button down" data-dir="down">↓</button></section><section class="rule-card"><h2>ルール</h2><p>ダイスは1個ずつ単独で転がします。</p><p>同じ上面の目が縦横につながり、その目の数以上になると全部消えます。</p><p>例：上面3のダイスが3個以上つながると、その3のダイスが消えます。</p><p>1は消えません。盤面のダイスをすべて消すとクリアです。</p></section></main><div id="clearModal" class="modal hidden"><div class="modal-content"><h2>STAGE CLEAR!</h2><p id="clearText">クリア！</p><button id="modalResetButton">次のステージへ</button></div></div><script type="module" src="script.js"></script></body></html>
